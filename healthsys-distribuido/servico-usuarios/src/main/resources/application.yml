server:
  port: 8081

spring:
  application:
    name: servico-usuarios
  datasource:
    url: jdbc:postgresql://localhost:5432/healthsys
    username: healthsys
    password: healthsys123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: healthsys-jwt-secret-unifor-2026-must-be-at-least-256-bits-long
  expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
